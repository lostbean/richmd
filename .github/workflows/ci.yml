name: CI

# design.md §08: CI runs a strict superset of what lefthook runs locally —
# every check lefthook's pre-commit hook runs, plus the slower checks a
# pre-commit hook can't afford to block a commit on. Every step below is the
# exact command a contributor runs via `nix develop -c <cmd>`.

on:
  push:
  pull_request:

jobs:
  ci:
    name: format + design-gate + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: format (nix flake check)
        run: nix develop -c nix flake check

      - name: build (nix build)
        run: nix develop -c nix build

      - name: install (npm ci)
        run: nix develop -c npm ci

      - name: test (npm test)
        run: nix develop -c npm test

      - name: design-gate (design-render --check, layer-integrity)
        run: |
          nix develop -c bash -c '
            set -e
            git ls-files "*design.md" | while read -r f; do
              scripts/design-render --check "$f"
            done
            scripts/layer-integrity .
          '

      - name: example-doc regression check (examples/ golden hash)
        run: nix develop -c scripts/example-hash-check

      - name: architecture-report example-doc regression check (examples/ golden hash)
        run: nix develop -c scripts/example-hash-check architecture-report

      - name: design-doc example-doc regression check (examples/ golden hash)
        run: nix develop -c scripts/example-hash-check design-doc

      - name: custom-theme-demo example-doc regression check (examples/ golden hash)
        run: nix develop -c scripts/example-hash-check custom-theme-demo

      - name: custom-theme-demo theme-swap proof (custom-theme.css genuinely reskins the rendered page)
        run: nix develop -c node scripts/theme-swap-check
